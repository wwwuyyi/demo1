<section class="page-hero">
  <div class="glow-orb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(142,196,160,0.12),transparent 70%);top:-60px;right:0"></div>
  <div class="container text-center">
    <div class="badge badge-green reveal mb-md">🧠 知识挑战</div>
    <h1 class="heading-xl gradient-text-2 reveal reveal-delay-1">巴猪问答</h1>

  </div>

<section class="quiz-section">
  <div class="container">
    <div class="quiz-wrap reveal">

      <!-- 进行中 -->
      <div id="quizBody">
        <!-- 顶部信息栏 -->
        <div class="quiz-topbar">
          <div class="quiz-progress-text" id="quizProgress">第 1 题 / 共 8 题</div>
          <div class="quiz-score-live">得分 <span id="liveScore">0</span></div>
          <div class="quiz-coins-live">🪙 <span id="liveCoins">0</span></div>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="quizFill" style="width:0%"></div>
        </div>

        <!-- 题目 -->
        <div class="quiz-question" id="quizQuestion"></div>

        <!-- 选项 -->
        <div class="quiz-options" id="quizOptions"></div>

        <!-- 反馈 -->
        <div class="quiz-feedback" id="quizFeedback"></div>

        <button class="btn btn-primary quiz-next" id="quizNext" style="display:none">
          下一题 →
        </button>
      </div>

      <!-- 结果页 -->
      <div id="quizResult" style="display:none;text-align:center">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 class="heading-lg mt-md" id="resultTitle">太厉害了！</h2>
        <div class="result-score mt-md" id="resultScore">8 / 8</div>
        <p class="result-desc mt-md" id="resultDesc"></p>
        <div class="result-reward mt-lg" id="resultReward"></div>
        <div class="result-actions mt-xl">
          <button class="btn btn-primary" id="retryBtn">再来一次 🔄</button>
          <a href="shop.html" class="btn btn-soft">去花爱心币 🛍️</a>
        </div>
      </div>

    </div>
  </div>
</section>
